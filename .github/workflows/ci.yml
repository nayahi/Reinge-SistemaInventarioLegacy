# =============================================================================
# ci.yml
# Laboratorio 7 - Parte B: CI/CD con GitHub Actions
# Ubicacion: .github/workflows/ci.yml
# -----------------------------------------------------------------------------
# PROPOSITO EDUCATIVO
# Pipeline de integracion continua construido con el MISMO patron probado del
# workflow de MuniDenuncia (pasos numerados, permisos minimos, artefactos
# descargables). Protege la reingenieria del sistema:
#
#   PASO 1  Checkout del repositorio
#   PASO 2  Instalar el SDK de .NET
#   PASO 3  Restaurar dependencias
#   PASO 4  Compilar en Release          (falla si hay errores de compilacion)
#   PASO 5  Ejecutar los tests            (falla -> pipeline ROJO = regresion)
#   PASO 6  Publicar resultados (.trx)    como artefacto descargable (evidencia)
#
# Se ejecuta en cada push y pull_request contra las ramas principales, y puede
# lanzarse manualmente desde la pestana Actions (workflow_dispatch).
#
# NOTA: el proyecto apunta a .NET 10 (ver .csproj), por eso se instala 10.0.x
# y NO 8.0.x como en el workflow original de MuniDenuncia.
# =============================================================================

name: CI Reingenieria - SistemaInventarioLegacy

on:
  push:
    branches: [ master, main, 'lab7/**' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:   # Permite ejecucion manual desde la UI de GitHub

# Permisos minimos (principio de privilegio minimo)
permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  # ===========================================================================
  # JOB 1: Compilacion + Tests de caracterizacion
  # ===========================================================================
  build-test:
    name: Compilacion y Tests de Caracterizacion
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # -----------------------------------------------------------------------
      # PASO 1: Checkout del codigo
      # -----------------------------------------------------------------------
      - name: Checkout codigo
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # PASO 2: Configurar el SDK de .NET 10
      # -----------------------------------------------------------------------
      - name: Instalar .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # -----------------------------------------------------------------------
      # PASO 3: Restaurar dependencias NuGet
      # -----------------------------------------------------------------------
      - name: Restaurar dependencias
        run: dotnet restore

      # -----------------------------------------------------------------------
      # PASO 4: Compilar en Release (sin volver a restaurar)
      # -----------------------------------------------------------------------
      - name: Compilar en Release
        run: dotnet build --no-restore -c Release

      # -----------------------------------------------------------------------
      # PASO 5: Ejecutar la suite de tests de caracterizacion.
      # Si un golden master se rompe (regresion), este paso falla y el pipeline
      # se pone en ROJO. --logger trx deja un reporte descargable.
      # -----------------------------------------------------------------------
      - name: Ejecutar tests de caracterizacion
        run: >
          dotnet test --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      # -----------------------------------------------------------------------
      # PASO 6: Publicar los resultados de tests como artefacto descargable.
      # Los estudiantes pueden bajarlo desde la pestana Actions como evidencia.
      # -----------------------------------------------------------------------
      - name: Publicar resultados de tests
        if: always()   # subir aunque algun test haya fallado
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: ./TestResults
          retention-days: 30

  # ===========================================================================
  # JOB 2: Analisis de calidad con SonarQube (opcional / no bloqueante)
  # Solo corre si el job build-test paso. Si no hay secrets configurados,
  # se OMITE sin romper el pipeline.
  # Configure en el repo: Settings -> Secrets and variables -> Actions
  #   - SONAR_TOKEN
  #   - SONAR_HOST_URL   (URL PUBLICA; localhost no es alcanzable desde el runner)
  # ===========================================================================
  sonarqube:
    name: Analisis SonarCloud (opcional)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-test
    if: ${{ github.event_name != 'pull_request' }}

    # Claves publicas del proyecto en SonarCloud (no son sensibles; el unico
    # secreto real es SONAR_TOKEN). https://sonarcloud.io es fijo.
    env:
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_ORGANIZATION: nayahi
      SONAR_PROJECT_KEY: nayahi_Reinge-SistemaInventarioLegacy

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Instalar Java 17 (requerido por SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Analisis SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::warning::SONAR_TOKEN no configurado. Se omite el analisis SonarCloud."
            exit 0
          fi
          dotnet tool install --global dotnet-sonarscanner
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet sonarscanner begin \
            /k:"$SONAR_PROJECT_KEY" \
            /o:"$SONAR_ORGANIZATION" \
            /d:sonar.host.url="$SONAR_HOST_URL" \
            /d:sonar.token="$SONAR_TOKEN"
          dotnet build -c Release
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      # -----------------------------------------------------------------------
      # Semana 9 - Parte 1: hace que el pipeline BLOQUEE de verdad si el
      # Quality Gate personalizado (Reingenieria-SistemaInventarioLegacy) queda
      # en rojo. Lee el report-task.txt generado por el scanner (paso anterior)
      # y consulta el estado real del gate en SonarCloud.
      # -----------------------------------------------------------------------
      - name: Verificar Quality Gate de SonarCloud
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
